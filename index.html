<html>

<body>
  <h1>Greg's stuff</h1>

  <h2>html5 games</h2>

  <h2>flash emulator</h2>

  <h2>webretro (arcade games!)</h2>

  <h2>the scramjet proxy (browse securely)</h2>
  <a>(placeholder)</a>

  <h2>wiki</h2>
  <a>(placeholder)</a>

  <script>
    const OWNER = "gregmccormick";
    const REPO = "gregmccormick.github.io";
    const BRANCH = "main";
    const FOLDER = "assets/flash";

    const flashLinks = document.getElementById("flash-links");

    function nameFromFile(file) {
      return file.replace(/\.swf$/i, "");
    }

    async function loadGames() {
      const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}?ref=${BRANCH}`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("Failed to fetch game list");

        const files = await res.json();

        const swfs = files
          .filter(file => file.type === "file" && file.name.toLowerCase().endsWith(".swf"))
          .sort((a, b) => a.name.localeCompare(b.name));

        flashLinks.innerHTML = "";

        if (!swfs.length) {
          flashLinks.textContent = "No .swf files found.";
          return;
        }

        for (const file of swfs) {
          const a = document.createElement("a");
          a.href = `./flashplayer.html?game=${encodeURIComponent(file.name)}`;
          a.target = "_blank";
          a.textContent = nameFromFile(file.name);

          flashLinks.appendChild(a);
          flashLinks.appendChild(document.createElement("br"));
        }
      } catch (err) {
        flashLinks.textContent = "Failed to load games.";
        console.error(err);
      }
    }

    loadGames();
  </script>
</body>
</html>
